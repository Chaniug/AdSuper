name: Sync Issues to AdSuper

permissions:
  contents: write

concurrency:
  group: sync-issues-adsuper
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 2 1,6,11,16,21,26 * *'  # 每月 1/6/11/16/21/26 日 UTC 02:00（约每5天）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python sync_issues.py

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add AdSuper.txt adnew.txt
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update rules from issues [skip ci]"
            git push || { echo "❌ git push failed"; exit 1; }
          fi
