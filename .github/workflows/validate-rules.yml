name: Validate Ad Rules

permissions:
  contents: read
  issues: write

concurrency:
  group: validate-ad-rules
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'adnew.txt'
  schedule:
    # 每周一 01:30 UTC（北京时间 09:30），早于 sync_issues 和 auto_release
    - cron: '30 1 * * 1'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v6
      
      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 安装依赖
        run: pip install -q -r requirements.txt
      
      - name: 🧪 运行单元测试
        run: python -m pytest test_rule_extraction.py -v
      
      - name: ✅ 验证规则完整性
        id: validate
        run: |
          python scripts/validation.py --mode all > validation.log 2>&1
          EXIT_CODE=$?
          SUMMARY=$(tail -n 1 validation.log || true)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="No summary output"
          fi
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ $EXIT_CODE -ne 0 ]; then
            exit $EXIT_CODE
          fi
          cat validation.log

      - name: 💬 PR 验证失败时评论
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = fs.readFileSync('validation.log', 'utf8');
            const MAX = 6000;
            if (log.length > MAX) {
              log = log.slice(-MAX);
              log = '...（已截断，查看 artifact 获取完整日志）\n' + log;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **规则验证失败**\n\n\`\`\`\n${log}\n\`\`\`\n\n完整日志已作为 artifact 上传，请下载查看，或在本地运行 \`python scripts/validation.py --mode all\` 查看详细信息.`
            })
      
      - name: 📊 生成验证总结与报告
        if: always()
        run: |
          VALIDATION_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          if [ "${{ job.status }}" = "success" ]; then
            STATUS_TEXT="✅ 通过"
          else
            STATUS_TEXT="❌ 失败"
          fi
          cat > VALIDATION_SUMMARY.md << ENDOFFILE
# 规则验证总结

**验证时间**: ${VALIDATION_TIME}
**工作流**: ${{ github.workflow }}
**触发者**: ${{ github.event_name }}
**状态**: ${STATUS_TEXT}

ENDOFFILE
          tail -n 500 validation.log >> VALIDATION_SUMMARY.md 2>/dev/null || true
          cp validation.log VALIDATION_REPORT.md 2>/dev/null || true
      
      - name: 📤 上传验证报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ github.run_id }}
          path: |
            VALIDATION_SUMMARY.md
            VALIDATION_REPORT.md
            validation.log
          retention-days: 30
